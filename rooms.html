<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xonalar chizmasi</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(#4aa8ff 0%, #8fd1ff 72%, #eeeeee 72%);
      display: flex;
      justify-content: center;
      align-items: center; /* O'rtaga keltirdik */
      overflow: hidden; /* Scroll butunlay yo'qotildi */
      font-family: Arial, Helvetica, sans-serif;
    }

    .app {
      position: relative;
      width: 1500px;
      height: 820px;
      flex: 0 0 auto;
      overflow: hidden;
      transform-origin: center center; /* Markazdan kichrayishi uchun */
    }

    .view {
      position: absolute;
      inset: 0;
      transition: opacity .25s ease, transform .25s ease;
    }

    .view.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(.98);
    }

    .ground {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 70px;
      background: #f3f3f3;
      border-top: 3px solid #b8c0c8;
    }

    .building {
      position: absolute;
      left: 50%;
      bottom: 50px;
      width: 1420px;
      height: 690px;
      transform: translateX(-50%);
    }

    .roof {
      position: absolute;
      top: 25px;
      left: 40px;
      width: 1340px;
      height: 118px;
      background: #f8f8f8;
      border-top: 18px solid #003b78;
      border-bottom: 22px solid #003b78;
    }

    .roof-under {
      position: absolute;
      top: 143px;
      left: 55px;
      width: 1310px;
      height: 35px;
      background: #e8e8e8;
      border-bottom: 3px solid #003b78;
      clip-path: polygon(0 0, 100% 0, 98.5% 100%, 1.5% 100%);
    }

    .sign {
      position: absolute;
      top: 0;
      left: 445px;
      width: 530px;
      height: 125px;
      background: #f7f7f7;
      border: 18px solid #003b78;
      cursor: pointer;
      overflow: hidden;
    }

    .sign::before {
      content: "BINONING SKELET CHIZMASI";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #003b78;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .sign.active {
      transform: translateY(-4px);
    }

    .decor {
      position: absolute;
      top: 18px;
      width: 20px;
      height: 125px;
      background: #003b78;
      cursor: pointer;
      transition: .22s;
    }

    .decor.active {
      transform: translateY(-6px);
    }

    .d1 { left: 135px; }
    .d2 { left: 175px; }
    .d3 { right: 175px; }
    .d4 { right: 135px; }

    .pillar {
      position: absolute;
      top: 165px;
      width: 74px;
      height: 440px;
      background: #003b78;
    }

    .pillar.left { left: 50px; }
    .pillar.right { right: 50px; }

    .floor {
      position: absolute;
      left: 175px;
      width: 1070px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 32px;
      z-index: 5;
    }

    .top-floor {
      top: 205px;
      height: 172px;
    }

    .bottom-floor {
      top: 425px;
      height: 160px;
    }

    .room {
      position: relative;
      background: #f7f7f7;
      border: 4px solid #003b78;
      overflow: visible;
      transition: .22s;
      cursor: pointer;
    }

    .room.active {
      transform: translateY(-4px);
      background: #ffffff;
    }

    .room-number {
      position: absolute;
      top: 30px;
      left: 70px;
      color: #003b78;
      font-size: 62px;
      font-weight: 900;
      line-height: 1;
      user-select: none;
      transition: .22s;
    }

    .room-number.active {
      transform: scale(1.14);
    }

    .door-wrap {
      position: absolute;
      right: 22px;
      bottom: 0;
      width: 72px;
      height: 142px;
      perspective: 700px;
      z-index: 7;
    }

    .door {
      position: absolute;
      inset: 0;
      background: #003c74;
      border: 6px solid #003b78;
      transform-origin: left center;
      transition: transform .45s ease, background .2s ease;
      cursor: pointer;
    }

    .door::before {
      content: "";
      position: absolute;
      inset: 18px 14px;
      border: 1px solid rgba(255,255,255,.14);
    }

    .door::after {
      content: "";
      position: absolute;
      left: 9px;
      top: 66px;
      width: 7px;
      height: 24px;
      background: #ead9b8;
      border-radius: 3px;
    }

    .door.open {
      transform: rotateY(-58deg);
      background: #075294;
    }

    .connector {
      position: absolute;
      right: -36px;
      top: 64px;
      width: 36px;
      height: 22px;
      background: #003b78;
    }

    .top-rail {
      position: absolute;
      top: 320px;
      left: 44px;
      width: 1332px;
      height: 88px;
      border-top: 4px solid #1d1d1d;
      z-index: 8;
      cursor: pointer;
      background:
        repeating-linear-gradient(
          90deg,
          #1d1d1d 0 2px,
          transparent 2px 22px
        );
    }

    .top-rail::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 47px;
      height: 2px;
      background: #1d1d1d;
    }

    .side-rail {
      position: absolute;
      top: 528px;
      width: 280px;
      height: 78px;
      border-top: 4px solid #1d1d1d;
      cursor: pointer;
      z-index: 8;
      background:
        repeating-linear-gradient(
          90deg,
          #1d1d1d 0 2px,
          transparent 2px 20px
        );
    }

    .side-rail::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 44px;
      height: 2px;
      background: #1d1d1d;
    }

    .side-rail.left { left: 40px; }
    .side-rail.right { right: 40px; }

    .top-rail.active,
    .side-rail.active {
      animation: railShake .28s linear;
    }

    @keyframes railShake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      50% { transform: translateX(4px); }
      75% { transform: translateX(-2px); }
      100% { transform: translateX(0); }
    }

    .slab {
      position: absolute;
      left: 40px;
      width: 1340px;
      background: #003b78;
      cursor: pointer;
      transition: .22s;
    }

    .slab.active {
      transform: translateY(-4px);
    }

    .middle-slab {
      top: 394px;
      height: 36px;
    }

    .lower-slab {
      top: 590px;
      height: 30px;
    }

    .lamp {
      position: absolute;
      width: 18px;
      height: 8px;
      background: #d9d1ba;
      border: 1px solid #7e7e7e;
      border-radius: 2px;
      cursor: pointer;
      transition: .2s;
      z-index: 10;
    }

    .lamp.on {
      background: #fff0a5;
      box-shadow: 0 0 10px rgba(255, 229, 107, .85);
      transform: scale(1.12);
    }

    .l1 { left: 300px; top: 180px; }
    .l2 { left: 640px; top: 180px; }
    .l3 { right: 640px; top: 180px; }
    .l4 { right: 300px; top: 180px; }

    .l5 { left: 300px; top: 403px; }
    .l6 { left: 640px; top: 403px; }
    .l7 { right: 640px; top: 403px; }
    .l8 { right: 300px; top: 403px; }

    .main-stairs {
      position: absolute;
      left: 425px;
      top: 575px;
      width: 570px;
      height: 76px;
      background:
        repeating-linear-gradient(
          to bottom,
          #eeeeee 0,
          #eeeeee 12px,
          #bcc4cb 13px,
          #dfe4e8 15px
        );
      border-left: 10px solid #003b78;
      border-right: 10px solid #003b78;
      cursor: pointer;
      transition: .22s;
      z-index: 9;
    }

    .main-stairs.active {
      transform: translateY(-4px);
    }

    /* PADVAL QISMI */
    .basement-zone {
      position: absolute;
      top: 626px;
      height: 82px;
      background: #003b78;
      padding: 12px;
      z-index: 6;
    }

    .basement-zone.left {
      left: 50px;
      width: 320px;
    }

    .basement-zone.right {
      right: 50px;
      width: 190px;
    }

    .basement-grid {
      width: 100%;
      height: 100%;
      display: grid;
      gap: 12px;
    }

    .basement-zone.left .basement-grid {
      grid-template-columns: 1fr 1fr;
    }

    .basement-zone.right .basement-grid {
      grid-template-columns: 1fr;
    }

    .basement-room {
      position: relative;
      background: #f7f7f7;
      border: 3px solid #d8d8d8;
      overflow: hidden;
      cursor: pointer;
      transition: .22s;
    }

    .basement-room.active {
      transform: translateY(-3px);
      background: #ffffff;
    }

    .basement-room::before {
      content: "PADVAL";
      position: absolute;
      top: 6px;
      left: 8px;
      color: #6c7278;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .basement-label {
      position: absolute;
      left: 44%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: #003b78;
      font-size: 27px;
      font-weight: 900;
      user-select: none;
      transition: .22s;
    }

    .basement-label.active {
      transform: translate(-50%, -50%) scale(1.12);
    }

    .basement-door {
      position: absolute;
      right: 7px;
      bottom: 0;
      width: 28px;
      height: 44px;
      background: #003c74;
      border: 3px solid #003b78;
      transform-origin: left center;
      transition: transform .42s ease, background .2s ease;
      cursor: pointer;
      z-index: 3;
    }

    .basement-door::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 18px;
      width: 4px;
      height: 12px;
      background: #ead9b8;
      border-radius: 2px;
    }

    .basement-door.open {
      transform: rotateY(-58deg);
      background: #075294;
    }

    /* PADVALGA TUSHUVCHI ZINALAR */
    .basement-stairs {
      position: absolute;
      z-index: 11;
      cursor: pointer;
      transition: .22s;
    }

    .basement-stairs.active {
      transform: translateY(-4px);
    }

    .basement-stairs.left {
      left: 115px;
      top: 586px;
      width: 115px;
      height: 48px;
    }

    .basement-stairs.right {
      right: 88px;
      top: 586px;
      width: 115px;
      height: 48px;
    }

    .basement-stairs-body {
      width: 100%;
      height: 100%;
      background:
        repeating-linear-gradient(
          to bottom,
          #f1f1f1 0,
          #f1f1f1 9px,
          #bac3cc 10px,
          #dce2e8 12px
        );
      border-left: 6px solid #003b78;
      border-right: 6px solid #003b78;
      border-bottom: 5px solid #003b78;
    }

    .basement-stairs-label {
      position: absolute;
      left: 50%;
      top: -24px;
      transform: translateX(-50%);
      background: #ffffff;
      color: #003b78;
      border: 1px solid #cfd8df;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
      user-select: none;
    }

    .basement-arrow {
      position: absolute;
      left: 50%;
      bottom: -18px;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 13px solid transparent;
      border-right: 13px solid transparent;
      border-top: 18px solid #003b78;
    }

    /* ICHKI XONA KO‘RINISHI */
    .interior-view {
      background: linear-gradient(#cfe9ff 0%, #eef7ff 55%, #d8d8d8 55%);
    }

    .classroom {
      position: absolute;
      left: 50%;
      top: 54%;
      width: 980px;
      height: 600px;
      transform: translate(-50%, -50%);
      background: #f7f7f7;
      border: 8px solid #003b78;
      overflow: hidden;
    }

    .classroom-wall {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 355px;
      background: #f5f5f5;
      border-bottom: 5px solid #d8d8d8;
    }

    .board {
      position: absolute;
      left: 50%;
      top: 75px;
      width: 620px;
      height: 235px;
      transform: translateX(-50%);
      background: #174f37;
      border: 12px solid #7b542e;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .board-title {
      font-size: 42px;
      font-weight: 900;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    .board-room {
      font-size: 28px;
      font-weight: 800;
      color: #ffe9a6;
    }

    .close-board {
      position: absolute;
      right: 12px;
      top: 12px;
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 50%;
      background: #d60000;
      color: white;
      font-size: 27px;
      font-weight: 900;
      line-height: 42px;
      cursor: pointer;
      transition: .2s;
    }

    .close-board:hover {
      transform: scale(1.08);
      background: #ff0000;
    }

    .teacher-table {
      position: absolute;
      left: 50%;
      top: 370px;
      width: 360px;
      height: 70px;
      transform: translateX(-50%);
      background: #8b5a34;
      border: 5px solid #5f3a1f;
    }

    .desk-row {
      position: absolute;
      left: 50%;
      width: 760px;
      display: flex;
      justify-content: space-between;
      transform: translateX(-50%);
    }

    .desk-row.r1 { top: 470px; }
    .desk-row.r2 { top: 535px; }

    .desk {
      width: 130px;
      height: 45px;
      background: #d8b27c;
      border: 4px solid #7a4d24;
    }

    .floor-line {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 245px;
      background:
        linear-gradient(90deg, rgba(0,0,0,.06) 1px, transparent 1px),
        linear-gradient(rgba(0,0,0,.06) 1px, transparent 1px),
        #dedede;
      background-size: 40px 40px;
    }
  </style>
</head>

<body>
  <div class="app" id="app">

    <div class="view main-view" id="mainView">
      <div class="building">

        <div class="roof"></div>
        <div class="roof-under"></div>
        <div class="sign clickable"></div>

        <div class="decor d1 clickable"></div>
        <div class="decor d2 clickable"></div>
        <div class="decor d3 clickable"></div>
        <div class="decor d4 clickable"></div>

        <div class="pillar left"></div>
        <div class="pillar right"></div>

        <div class="lamp l1"></div>
        <div class="lamp l2"></div>
        <div class="lamp l3"></div>
        <div class="lamp l4"></div>
        <div class="lamp l5"></div>
        <div class="lamp l6"></div>
        <div class="lamp l7"></div>
        <div class="lamp l8"></div>

        <div class="floor top-floor">
          <div class="room clickable">
            <div class="room-number">1</div>
            <div class="door-wrap"><div class="door" data-room="1-xona"></div></div>
            <div class="connector"></div>
          </div>

          <div class="room clickable">
            <div class="room-number">2</div>
            <div class="door-wrap"><div class="door" data-room="2-xona"></div></div>
            <div class="connector"></div>
          </div>

          <div class="room clickable">
            <div class="room-number">3</div>
            <div class="door-wrap"><div class="door" data-room="3-xona"></div></div>
            <div class="connector"></div>
          </div>

          <div class="room clickable">
            <div class="room-number">4</div>
            <div class="door-wrap"><div class="door" data-room="4-xona"></div></div>
          </div>
        </div>

        <div class="top-rail clickable"></div>
        <div class="slab middle-slab clickable"></div>

        <div class="floor bottom-floor">
          <div class="room clickable">
            <div class="room-number">5</div>
            <div class="door-wrap"><div class="door" data-room="5-xona"></div></div>
            <div class="connector"></div>
          </div>

          <div class="room clickable">
            <div class="room-number">6</div>
            <div class="door-wrap"><div class="door" data-room="6-xona"></div></div>
            <div class="connector"></div>
          </div>

          <div class="room clickable">
            <div class="room-number">7</div>
            <div class="door-wrap"><div class="door" data-room="7-xona"></div></div>
            <div class="connector"></div>
          </div>

          <div class="room clickable">
            <div class="room-number">8</div>
            <div class="door-wrap"><div class="door" data-room="8-xona"></div></div>
          </div>
        </div>

        <div class="side-rail left clickable"></div>
        <div class="side-rail right clickable"></div>

        <div class="slab lower-slab clickable"></div>
        <div class="main-stairs clickable"></div>

        <div class="basement-stairs left clickable">
          <div class="basement-stairs-label">Padvalga tushish</div>
          <div class="basement-stairs-body"></div>
          <div class="basement-arrow"></div>
        </div>

        <div class="basement-stairs right clickable">
          <div class="basement-stairs-label">Padvalga tushish</div>
          <div class="basement-stairs-body"></div>
          <div class="basement-arrow"></div>
        </div>

        <div class="basement-zone left">
          <div class="basement-grid">
            <div class="basement-room clickable">
              <div class="basement-label">9A</div>
              <div class="basement-door" data-room="9A padval xona"></div>
            </div>

            <div class="basement-room clickable">
              <div class="basement-label">9B</div>
              <div class="basement-door" data-room="9B padval xona"></div>
            </div>
          </div>
        </div>

        <div class="basement-zone right">
          <div class="basement-grid">
            <div class="basement-room clickable">
              <div class="basement-label">10A</div>
              <div class="basement-door" data-room="10A padval xona"></div>
            </div>
          </div>
        </div>

      </div>

      <div class="ground"></div>
    </div>

    <div class="view interior-view hidden" id="interiorView">
      <div class="classroom">
        <div class="classroom-wall"></div>
        <div class="floor-line"></div>

        <div class="board">
          <button class="close-board" id="closeRoom">×</button>
          <div class="board-title">Sizning xonangiz</div>
          <div class="board-room" id="roomName">1-xona</div>
        </div>

        <div class="teacher-table"></div>

        <div class="desk-row r1">
          <div class="desk"></div>
          <div class="desk"></div>
          <div class="desk"></div>
          <div class="desk"></div>
        </div>

        <div class="desk-row r2">
          <div class="desk"></div>
          <div class="desk"></div>
          <div class="desk"></div>
          <div class="desk"></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ================= DYNAMIC SCALING (YANGI QO'SHILDI) =================
    function fitToScreen() {
      const app = document.getElementById('app');
      const w = window.innerWidth;
      const h = window.innerHeight;
      
      // Iframe yoki ekran o'lchamiga qarab binoni aniq masshtablaymiz (kichraytiramiz/kattalashtiramiz)
      const scale = Math.min(w / 1500, h / 820) * 0.95; // 0.95 chiroyli bo'shliq qoldirish uchun
      
      app.style.transform = `scale(${scale})`;
    }
    
    // Oyna o'zgarganda yoki iframe yuklanganda ishga tushadi
    window.addEventListener('resize', fitToScreen);
    fitToScreen();
    // ======================================================================

    document.addEventListener("DOMContentLoaded", () => {
      const app = document.getElementById("app");
      const mainView = document.getElementById("mainView");
      const interiorView = document.getElementById("interiorView");
      const roomName = document.getElementById("roomName");
      const closeRoom = document.getElementById("closeRoom");

      app.addEventListener("pointerdown", (e) => {
        const target = e.target;

        if (target.classList.contains("door") || target.classList.contains("basement-door")) {
          openDoorAndEnter(target);
          return;
        }

        if (target.classList.contains("lamp")) {
          target.classList.toggle("on");
          return;
        }

        if (target.classList.contains("room-number")) {
          pulse(target);
          const room = target.closest(".room");
          if (room) pulse(room);
          return;
        }

        if (target.classList.contains("basement-label")) {
          pulse(target);
          const room = target.closest(".basement-room");
          if (room) pulse(room);
          return;
        }

        const clickable = target.closest(".clickable");
        if (clickable) {
          pulse(clickable);
        }
      });

      closeRoom.addEventListener("pointerdown", (e) => {
        e.stopPropagation();
        showMain();
      });

      function openDoorAndEnter(door) {
        const selectedRoom = door.dataset.room || "xona";

        door.classList.add("open");

        setTimeout(() => {
          roomName.textContent = selectedRoom;
          mainView.classList.add("hidden");
          interiorView.classList.remove("hidden");

          setTimeout(() => {
            door.classList.remove("open");
          }, 250);
        }, 430);
      }

      function showMain() {
        interiorView.classList.add("hidden");
        mainView.classList.remove("hidden");
      }

      function pulse(el) {
        el.classList.remove("active");
        void el.offsetWidth;
        el.classList.add("active");

        clearTimeout(el._timer);
        el._timer = setTimeout(() => {
          el.classList.remove("active");
        }, 420);
      }

      // ================= Yordamchi Qism: URL orqali kelgan xonani qizil yonib-o'chadigan qilish =================
      const urlParams = new URLSearchParams(window.location.search);
      const activeRoom = urlParams.get('room');
      
      if(activeRoom) {
          let targetDoor = null;
          if(['9A', '9B', '10A', '10B'].includes(activeRoom)) {
              targetDoor = document.querySelector(`[data-room="${activeRoom} padval xona"]`);
          } else {
              targetDoor = document.querySelector(`[data-room="${activeRoom}-xona"]`);
          }

          if(targetDoor) {
              const roomDiv = targetDoor.closest('.room') || targetDoor.closest('.basement-room');
              if(roomDiv) {
                  roomDiv.style.transition = "all 0.4s ease";
                  roomDiv.style.border = '5px solid #f43f5e'; 
                  roomDiv.style.boxShadow = '0 0 25px rgba(244,63,94, 0.8)';
                  roomDiv.style.background = '#ffe4e6';
                  roomDiv.style.transform = 'translateY(-6px)';
                  
                  // Chiroqni yoqish kabi pulsatsiya animasiyasi
                  setInterval(() => {
                      roomDiv.style.opacity = roomDiv.style.opacity === '0.6' ? '1' : '0.6';
                  }, 500);
              }
          }
      }
    });
  </script>
</body>
</html>
